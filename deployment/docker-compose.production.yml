# Living Classroom - Production Docker Compose Configuration
# ==========================================================
#
# Production-ready deployment with:
# - Load balancing
# - Redis clustering
# - PostgreSQL with read replicas
# - Monitoring & logging
# - WebSocket support
# - SSL termination

version: '3.8'

services:
  # === Load Balancer & SSL Termination ===
  nginx:
    image: nginx:1.25-alpine
    container_name: lyo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - lyo-app-1
      - lyo-app-2
      - lyo-app-3
    networks:
      - lyo-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === Application Servers (3 replicas for HA) ===
  lyo-app-1:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: lyo-app-1
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://lyo_user:${DB_PASSWORD}@postgres-primary:5432/lyo_production
      - REDIS_URL=redis://redis-cluster:6379
      - WEBSOCKET_ENABLED=true
      - LIVING_CLASSROOM_ENABLED=true
      - AB_TEST_ENABLED=true
      - LOG_LEVEL=info
    depends_on:
      - postgres-primary
      - redis-cluster
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  lyo-app-2:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: lyo-app-2
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://lyo_user:${DB_PASSWORD}@postgres-primary:5432/lyo_production
      - REDIS_URL=redis://redis-cluster:6379
      - WEBSOCKET_ENABLED=true
      - LIVING_CLASSROOM_ENABLED=true
      - AB_TEST_ENABLED=true
      - LOG_LEVEL=info
    depends_on:
      - postgres-primary
      - redis-cluster
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  lyo-app-3:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: lyo-app-3
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://lyo_user:${DB_PASSWORD}@postgres-primary:5432/lyo_production
      - REDIS_URL=redis://redis-cluster:6379
      - WEBSOCKET_ENABLED=true
      - LIVING_CLASSROOM_ENABLED=true
      - AB_TEST_ENABLED=true
      - LOG_LEVEL=info
    depends_on:
      - postgres-primary
      - redis-cluster
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Database - Primary/Replica Setup ===
  postgres-primary:
    image: postgres:15-alpine
    container_name: lyo-postgres-primary
    environment:
      - POSTGRES_DB=lyo_production
      - POSTGRES_USER=lyo_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_REPLICATION_MODE=master
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=${REPLICATION_PASSWORD}
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./database/init-scripts:/docker-entrypoint-initdb.d
      - ./database/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=6GB

  postgres-replica:
    image: postgres:15-alpine
    container_name: lyo-postgres-replica
    environment:
      - POSTGRES_MASTER_SERVICE=postgres-primary
      - POSTGRES_REPLICATION_MODE=slave
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=${REPLICATION_PASSWORD}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      - postgres-primary
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # === Redis Cluster for Session & Caching ===
  redis-cluster:
    image: redis:7-alpine
    container_name: lyo-redis-cluster
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # === Monitoring & Observability ===
  prometheus:
    image: prom/prometheus:latest
    container_name: lyo-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - lyo-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'

  grafana:
    image: grafana/grafana:latest
    container_name: lyo-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - lyo-network
    restart: unless-stopped

  # === Log Aggregation ===
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: lyo-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    container_name: lyo-logstash
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: lyo-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - lyo-network
    restart: unless-stopped

  # === Background Workers ===
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: lyo-celery-worker
    command: celery -A lyo_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://lyo_user:${DB_PASSWORD}@postgres-primary:5432/lyo_production
      - REDIS_URL=redis://redis-cluster:6379
    depends_on:
      - postgres-primary
      - redis-cluster
    networks:
      - lyo-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: lyo-celery-beat
    command: celery -A lyo_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://lyo_user:${DB_PASSWORD}@postgres-primary:5432/lyo_production
      - REDIS_URL=redis://redis-cluster:6379
    depends_on:
      - postgres-primary
      - redis-cluster
    networks:
      - lyo-network
    restart: unless-stopped

# === Networks ===
networks:
  lyo-network:
    driver: bridge

# === Volumes ===
volumes:
  postgres_primary_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local