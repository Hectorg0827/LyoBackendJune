name: Backend CI and release image

# Railway owns production deployment through its GitHub integration. This
# workflow proves the revision and publishes an immutable image, but never
# changes production infrastructure directly.
permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test, migrate, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      PYTHONPATH: .
      ENVIRONMENT: development
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-for-ci-cd-at-least-32-characters-long

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx flake8 bandit mypy

      - name: Prove database migrations on PostgreSQL
        run: alembic upgrade head

      - name: Run tests with coverage
        run: python -m pytest --cov=lyo_app --cov-report=xml tests/

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
        continue-on-error: true

      - name: Reject fatal Python errors
        run: flake8 lyo_app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Record full lint report
        run: flake8 lyo_app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Reject high-confidence security findings
        run: bandit -r lyo_app -lll -iii

      - name: Record type-checking debt
        run: mypy lyo_app --ignore-missing-imports
        continue-on-error: true

  build:
    name: Build immutable release image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test
    if: github.event_name != 'pull_request'

    outputs:
      image-ref: ${{ steps.image-ref.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Expose immutable image reference
        id: image-ref
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          REPOSITORY=$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "value=ghcr.io/$REPOSITORY@$DIGEST" >> "$GITHUB_OUTPUT"

  security:
    name: Scan immutable release image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Scan container
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build.outputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
