name: Security Scan

# Defensive scanning: catch committed secrets (the leaked lyo_sk_live_* key
# incident) and obvious dependency vulnerabilities before they merge.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Scans the push/PR commit range for NEW secrets. The historical
        # lyo_sk_live_* leak must be scrubbed separately (git filter-repo) and
        # the key rotated — scanning full history here would block every PR
        # until that cleanup lands.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  dependency-audit:
    name: Dependency vulnerability audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          # Non-blocking for now (report only) — flip to fail once the existing
          # backlog is triaged.
          pip-audit -r requirements.txt || true
